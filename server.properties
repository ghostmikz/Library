# NMIT Library Server Configuration
# Edit these values before starting the server on a LAN machine.

# Port the server listens on
server.port=9091

# MySQL / MariaDB connection
# Set db.host to the LAN IP of the machine running MySQL (e.g. 192.168.1.10)
db.host=localhost
db.port=3306
db.user=lib_user
db.password=lib1234
